# GridPace Settings
# -----------------
# Authoritative configuration for all GridPace components.
# anomaly.py, iso_cards.py, and the Prefect flows all read from this file
# via gridpace.config.app_config. Change values here; never hardcode them.

# ---------------------------------------------------------------------------
# Data ingestion
# ---------------------------------------------------------------------------
ingestion:
  poll_interval_minutes: 5    # local real-time system poll interval in minutes.
                              # gridstatus open-source library has no request limits.
                              # See docs/architecture.md Key Decisions for full
                              # polling rationale and constraint documentation.
  dry_run: true               # set to false for live API calls
  default_row_limit: 10       # rows per fetch during development

# ---------------------------------------------------------------------------
# ISOs to monitor
# Supported: ERCOT, CAISO, MISO, SPP, NYISO, ISONE, IESO, AESO
# PJM requires PJM_API_KEY in .env — skipped gracefully if not set
# See docs/data_sources.md for ISO-specific requirements
# ---------------------------------------------------------------------------
isos:
  - ERCOT
  - CAISO
  - PJM
  - MISO
  - SPP
  - NYISO
  - ISONE
  - IESO
  - AESO

# ---------------------------------------------------------------------------
# Data retention
# ---------------------------------------------------------------------------
retention:
  bronze_days: 90   # raw bronze data ages off after 90 days
                    # silver/gold layers retain processed aggregates

# ---------------------------------------------------------------------------
# Dashboard
# ---------------------------------------------------------------------------
dashboard:
  # cache_ttl_seconds and refresh_interval_seconds must equal
  # ingestion.poll_interval_minutes * 60. If you change the poll interval,
  # update both values here to match.
  cache_ttl_seconds: 7200         # 120 min * 60 s — Streamlit @st.cache_data TTL
  refresh_interval_seconds: 7200  # 120 min * 60 s — auto-refresh trigger
  lookback_hours: 48          # time window for min/max display and anomaly baselines

# ---------------------------------------------------------------------------
# Health monitoring thresholds
# ---------------------------------------------------------------------------
health:
  db_size_warning_gb: 1.0    # warn when DB exceeds this size
  db_size_error_gb: 2.0      # error when DB exceeds this size
  data_gap_warning_minutes: 15    # warn if no data in this many minutes
  data_gap_error_minutes: 60      # error if no data in this many minutes

# ---------------------------------------------------------------------------
# LMP price thresholds ($/MWh)
# Used by iso_cards.py for colour-coded price display.
# These are static display bands, separate from anomaly detection.
# Anomaly detection uses statistical z-score baselines (see [anomaly] below).
# ---------------------------------------------------------------------------
thresholds:
  lmp:
    normal_max: 50     # below this is normal (green)
    elevated_max: 100  # below this is elevated (yellow); above is high alert (red)

# ---------------------------------------------------------------------------
# Anomaly detection
# Used by intelligence/detection/anomaly.py.
# All thresholds reference standard normal distribution coverage bands:
#   |z| < 1.0  => within ~68% of historical observations  (green)
#   |z| < 2.0  => within ~95% of historical observations  (yellow)
#   |z| < 3.0  => within ~99.7% of historical observations (red)
#   |z| >= 3.0 => extreme outlier                          (critical)
#
# Status levels (five total):
#   grey     — insufficient history to compute baseline
#   green    — normal
#   yellow   — elevated
#   red      — anomalous
#   critical — extreme outlier; warrants immediate attention
#
# Polling constraint: baselines are computed from 2-hour-interval data.
# Only sustained anomalies are detectable; transient spikes are not.
# ---------------------------------------------------------------------------
anomaly:
  min_data_points: 5          # minimum history rows before baseline is valid;
                              # returns grey status if below this count
  z_score_elevated: 1.0       # yellow threshold — ~68% normal band boundary
  z_score_high: 2.0           # red threshold    — ~95% normal band boundary
  z_score_critical: 3.0       # critical threshold — ~99.7% normal band boundary

# ---------------------------------------------------------------------------
# Seed script configuration
# Synthetic data parameters for scripts/seed_db.py
# Adjust these to generate more realistic data for your region/timeframe
#
# NOTE: LMP means and fuel mix percentages are approximate historical averages
# based on publicly available ISO reports and EIA data (circa 2023-2024).
# These are for synthetic data generation only — not for production analysis.
# MISO coal percentage may be slightly high as grid decarbonizes.
# IESO (Ontario) nuclear dominance (~60%) is accurate.
# AESO (Alberta) nuclear is 0% — Alberta has no nuclear generation.
# Replace with real data using scripts/backfill_events.py for production use.
# ---------------------------------------------------------------------------
seed:
  default_hours: 168   # hours of synthetic history to generate by default

  # LMP price distributions per ISO (mean and std in $/MWh)
  # Based on approximate historical averages
  lmp_params:
    ERCOT:
